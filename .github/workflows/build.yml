name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Configure native renderer
        run: cmake -S native/ElyFlow.Native -B native/ElyFlow.Native/build -A x64

      - name: Build native renderer
        run: cmake --build native/ElyFlow.Native/build --config Release

      - name: Restore
        run: dotnet restore "ElyCast TV Player.csproj"

      - name: Build managed application
        run: dotnet build "ElyCast TV Player.csproj" -c Release -p:Platform=x64 --no-restore

      - name: Run regression checks
        run: dotnet run --project tests/ElyCast.Regression/ElyCast.Regression.csproj -c Release
